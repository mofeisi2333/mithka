name: 🌙 Sync Nightly

# Merge master into nightly twice per day. Every sync that incorporates new
# master commits increments the app's patch version once. A generated
# GITHUB_TOKEN push doesn't trigger other workflows, so a changed sync
# explicitly dispatches release.yml.

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

concurrency:
  group: sync-nightly
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  sync:
    name: Sync master to nightly
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Merge changed master into a versioned nightly
        id: sync
        run: |
          git fetch origin master
          master_raw="$(git show origin/master:pubspec.yaml | awk '/^version:/ { print $2; exit }')"
          test -n "$master_raw"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin nightly >/dev/null 2>&1; then
            git fetch origin nightly
            if git merge-base --is-ancestor origin/master origin/nightly; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "nightly already contains the current master"
              exit 0
            fi

            previous_raw="$(git show origin/nightly:pubspec.yaml | awk '/^version:/ { print $2; exit }')"
            test -n "$previous_raw"
            git checkout -B nightly origin/nightly
            if ! git merge --no-commit --no-ff origin/master; then
              conflicts="$(git diff --name-only --diff-filter=U)"
              if [ "$conflicts" != "pubspec.yaml" ]; then
                echo "nightly merge has conflicts outside pubspec.yaml:" >&2
                printf '%s\n' "$conflicts" >&2
                exit 1
              fi
              # Both branches may have changed the version line. The generated
              # nightly version below is based on both values, so start from
              # master's copy of the rest of pubspec.yaml.
              git checkout --theirs -- pubspec.yaml
              git add pubspec.yaml
            fi
          else
            previous_raw="$master_raw"
            git checkout -B nightly origin/master
          fi

          master_semver="${master_raw%%+*}"
          previous_semver="${previous_raw%%+*}"
          IFS=. read -r master_major master_minor master_patch master_extra <<< "$master_semver"
          IFS=. read -r previous_major previous_minor previous_patch previous_extra <<< "$previous_semver"
          for component in "$master_major" "$master_minor" "$master_patch" \
            "$previous_major" "$previous_minor" "$previous_patch"; do
            case "$component" in
              ''|*[!0-9]*) echo "Invalid app version component: $component" >&2; exit 1 ;;
            esac
          done
          if [ -n "$master_extra" ] || [ -n "$previous_extra" ]; then
            echo "Expected X.Y.Z versions, got $master_semver and $previous_semver" >&2
            exit 1
          fi

          if [ "$master_major" = "$previous_major" ] && \
            [ "$master_minor" = "$previous_minor" ] && \
            [ "$previous_patch" -ge "$master_patch" ]; then
            nightly_patch=$((previous_patch + 1))
          else
            nightly_patch=$((master_patch + 1))
          fi
          nightly_version="$master_major.$master_minor.$nightly_patch"
          case "$master_raw" in
            *+*) nightly_raw="$nightly_version+${master_raw#*+}" ;;
            *) nightly_raw="$nightly_version" ;;
          esac

          sed -i -E "s/^version:.*/version: $nightly_raw/" pubspec.yaml
          test "$(awk '/^version:/ { print $2; exit }' pubspec.yaml)" = "$nightly_raw"
          git add pubspec.yaml
          git diff --check --cached -- pubspec.yaml
          git commit -m "chore: sync nightly $nightly_version"
          git push origin HEAD:nightly
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "nightly_version=$nightly_version" >> "$GITHUB_OUTPUT"
          echo "nightly now contains master at app version $nightly_raw"

      - name: Dispatch nightly prerelease
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref nightly
