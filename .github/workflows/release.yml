name: 🚀 Release APK

# Builds per-ABI **release** APKs on a version tag (or manual dispatch). Each ABI
# (arm64-v8a, armeabi-v7a) builds in its OWN parallel matrix job — compiling the
# native TDLib (tdjson) + static OpenSSL for just that ABI — then a final job
# publishes all the APKs to a single GitHub Release.
#
# Bump + tag a release with: ./scripts/bump-version.sh [major|minor|patch]
#
# Required repository secrets:
#   TELEGRAM_API_ID, TELEGRAM_API_HASH   — baked into lib/config/secrets.dart
#   ANDROID_KEYSTORE_BASE64              — base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD            — store password
#   ANDROID_KEY_PASSWORD                 — key password
#   ANDROID_KEY_ALIAS                    — key alias (e.g. nekoko)
# Without the ANDROID_* secrets the build still runs but is debug-signed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.abi }} APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # One job per ABI → the heavy OpenSSL + TDLib compile runs in parallel.
      matrix:
        include:
          - abi: arm64-v8a
            target: android-arm64
          - abi: armeabi-v7a
            target: android-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf clang libssl-dev

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Android NDK 28.2.13676358
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358" >/dev/null 2>&1 || \
          yes | sdkmanager "ndk;28.2.13676358" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      # Cache the heavy native build per ABI, keyed on the build scripts.
      - name: Cache native build (.tdlib-build)
        uses: actions/cache@v4
        with:
          path: .tdlib-build
          key: tdnative-${{ runner.os }}-ndk28-${{ matrix.abi }}-${{ hashFiles('scripts/build-tdjson-android.sh', 'scripts/build-openssl-android.sh') }}

      - name: Cache jniLibs (${{ matrix.abi }})
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs/${{ matrix.abi }}
          key: jnilibs-${{ runner.os }}-ndk28-${{ matrix.abi }}-${{ hashFiles('scripts/build-tdjson-android.sh', 'scripts/build-openssl-android.sh') }}

      - name: Build static OpenSSL (${{ matrix.abi }})
        run: ./scripts/build-openssl-android.sh ${{ matrix.abi }}

      - name: Build libtdjson.so (${{ matrix.abi }})
        env:
          HOST_OPENSSL_ROOT_DIR: /usr
          TD_ENABLE_LTO: 'OFF'
        run: ./scripts/build-tdjson-android.sh ${{ matrix.abi }}

      - name: Flutter dependencies
        run: flutter pub get

      - name: Write Firebase Android config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          : "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64:?set FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 in repository secrets}"
          mkdir -p android/app
          printf '%s' "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json

      - name: Write secrets.dart
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart <<EOF
          class Secrets {
            static const int apiId = ${TELEGRAM_API_ID:-0};
            static const String apiHash = '${TELEGRAM_API_HASH}';
            static bool get isConfigured => apiId != 0 && apiHash.isNotEmpty;
          }
          EOF

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        if: ${{ env.KEYSTORE_B64 != '' }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=${KEY_PASSWORD:-$STORE_PASSWORD}
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build ${{ matrix.abi }} release APK
        run: flutter build apk --release --split-per-abi --target-platform ${{ matrix.target }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: build/app/outputs/flutter-apk/app-${{ matrix.abi }}-release.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all ABI APKs
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR apks

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*-release.apk
          fail_on_unmatched_files: true

      - name: Notify Telegram channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CI_CHANNEL: ${{ secrets.TELEGRAM_CI_CHANNEL }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CI_CHANNEL"
          curl -fsS \
            -F "chat_id=$TELEGRAM_CI_CHANNEL" \
            -F "text=🚀 Mithka release $RELEASE_TAG

          APKs: $RELEASE_URL" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
